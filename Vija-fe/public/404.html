<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Không tìm thấy trang</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f3f4f6;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1 { color: #ef4444; margin: 0 0 10px; }
    p { color: #6b7280; margin: 0 0 20px; }
    a {
      display: inline-block;
      padding: 10px 20px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
    a:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Không tìm thấy trang</p>
    <a href="/">Về trang chủ</a>

</html>
